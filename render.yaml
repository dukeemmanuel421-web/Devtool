services:
  - type: web
    name: agentguard-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AGENTGUARD_API_KEYS
        sync: false          # set your comma-separated keys in the dashboard
      - key: AGENTGUARD_RATE_LIMIT
        value: "60"
      - key: AGENTGUARD_RATE_WINDOW_S
        value: "60"
